name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  release-validate:
    name: Release validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history is required for GoReleaser changelog generation.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate .goreleaser.yaml
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: check

      - name: Snapshot build (current platform)
        # Builds only the binary for the runner's OS/arch to catch compile errors
        # without the cost of full cross-compilation on every PR.
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: build --snapshot --single-target --clean
