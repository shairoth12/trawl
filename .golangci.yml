version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - revive
    - govet
    - staticcheck
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: exported

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/shairoth12/trawl
